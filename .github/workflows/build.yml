name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download JavaFX SDK
        run: |
          Invoke-WebRequest -Uri "https://download2.gluonhq.com/openjfx/17.0.2/openjfx-sdk-17.0.2_windows-x64_bin.zip" -OutFile javafx.zip
          Expand-Archive javafx.zip -DestinationPath .
      
      - name: Build JAR
        env:
          MAVEN_OPTS: -Xmx2g
        run: mvn clean package -DskipTests
      
      - name: Create Windows executable
        run: |
          $javafxLib = Get-ChildItem -Path "openjfx-sdk-17.0.2\lib" -Filter "*.jar" | Select-Object -ExpandProperty FullName -Join ";"
          jpackage --input target --main-jar tcp-finanzas-1.0.jar --main-class com.tcpfinanzas.Main --name TCPFinanzas --type exe --java-options "--module-path $javafxLib"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TCPFinanzas
          path: TCPFinanzas.exe

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build JAR
        run: mvn clean package -DskipTests
      
      - name: Create Linux AppImage
        run: |
          wget -q https://download2.gluonhq.com/openjfx/17.0.2/openjfx-sdk-17.0.2_linux-x64_bin.zip -O javafx.zip
          unzip -q javafx.zip
          javafx_lib=$(find openjfx-sdk-17.0.2/lib -name "*.jar" | tr '\n' ';')
          jpackage --input target --main-jar tcp-finanzas-1.0.jar --main-class com.tcpfinanzas.Main --name TCPFinanzas --type app-image --java-options "--module-path $javafx_lib"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TCPFinanzas-linux
          path: TCPFinanzas