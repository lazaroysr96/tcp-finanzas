name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download JavaFX SDK
        run: |
          # Descargar javafx controls, graphics, base para Windows
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/openjfx/javafx-controls/17.0.2/javafx-controls-17.0.2-win.jar" -OutFile javafx-controls.jar -UseBasicParsing
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/openjfx/javafx-graphics/17.0.2/javafx-graphics-17.0.2-win.jar" -OutFile javafx-graphics.jar -UseBasicParsing
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/openjfx/javafx-base/17.0.2/javafx-base-17.0.2-win.jar" -OutFile javafx-base.jar -UseBasicParsing
          mkdir javafx-lib
          Move-Item -Path "*.jar" -Destination javafx-lib
      
      - name: Build JAR
        env:
          MAVEN_OPTS: -Xmx2g
        run: mvn clean package -DskipTests
      
      - name: Create Windows executable
        run: |
          $javafxLib = (Get-ChildItem -Path "javafx-lib" -Filter "*.jar" | ForEach-Object { $_.FullName }) -join ";"
          jpackage --input target --main-jar tcp-finanzas-1.0.jar --main-class com.tcpfinanzas.Main --name TCPFinanzas --type exe --java-options "--module-path $javafxLib"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TCPFinanzas
          path: TCPFinanzas.exe

