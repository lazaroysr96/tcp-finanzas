name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download JavaFX SDK
        run: |
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/openjfx/javafx/17.0.2/javafx-17.0.2-sdk.zip" -OutFile javafx.zip -UseBasicParsing
          Expand-Archive javafx.zip -DestinationPath . -Force
      
      - name: Build JAR
        env:
          MAVEN_OPTS: -Xmx2g
        run: mvn clean package -DskipTests
      
      - name: Create Windows executable
        run: |
          $javafxLib = Get-ChildItem -Path "openjfx-sdk-17.0.2\lib" -Filter "*.jar" | Select-Object -ExpandProperty FullName -Join ";"
          jpackage --input target --main-jar tcp-finanzas-1.0.jar --main-class com.tcpfinanzas.Main --name TCPFinanzas --type exe --java-options "--module-path $javafxLib"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TCPFinanzas
          path: TCPFinanzas.exe

